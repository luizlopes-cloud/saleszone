name: Correção retroativa sem_pipedrive

on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Data a corrigir (YYYY-MM-DD)'
        required: true
        default: '2026-04-09'

jobs:
  correct:
    runs-on: ubuntu-latest
    steps:
      - name: Corrigir falsos sem_pipedrive
        run: |
          response=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://saleszone.vercel.app/api/growth/audit-mql/correct-sem-pipedrive?date=${{ github.event.inputs.date }}")
          echo "$response"
