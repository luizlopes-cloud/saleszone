name: Premium Diário SZS

on:
  schedule:
    - cron: '0 13 * * 1-5'  # Seg-Sex 10h BRT (13h UTC)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Apenas simular (true/false)'
        default: 'false'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run premium diário
        env:
          PIPEDRIVE_API_TOKEN: ${{ secrets.PIPEDRIVE_API_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_DM_CHANNEL_MAYARA: ${{ secrets.SLACK_DM_CHANNEL_MAYARA }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python scripts/premium_diario_szs.py >> $GITHUB_STEP_SUMMARY
