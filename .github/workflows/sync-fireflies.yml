name: Sync Fireflies Transcripts

on:
  schedule:
    - cron: '0 8 * * *' # 5h BRT (UTC-3)
  workflow_dispatch:
    inputs:
      days_back:
        description: 'Dias para buscar (default 2)'
        required: false
        default: '2'
      dry_run:
        description: 'Apenas simular (true/false)'
        required: false
        default: 'false'

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run sync
        env:
          FIREFLIES_API_KEY: ${{ secrets.FIREFLIES_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DAYS_BACK: ${{ inputs.days_back || '2' }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: python scripts/sync_fireflies.py

      - name: Summary
        if: always()
        run: |
          if [ -f /tmp/sync_summary.txt ]; then
            cat /tmp/sync_summary.txt >> $GITHUB_STEP_SUMMARY
          else
            echo "## Sync Fireflies" >> $GITHUB_STEP_SUMMARY
            echo "Nenhum summary gerado." >> $GITHUB_STEP_SUMMARY
          fi
