<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BPMN — Processo CTWA Should Be (Vendas Spot)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #f5f5f5; padding: 20px; }
  h1 { text-align: center; font-size: 18px; color: #333; margin-bottom: 4px; }
  .subtitle { text-align: center; font-size: 13px; color: #666; margin-bottom: 20px; }
  .container { background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); overflow-x: auto; padding: 0; }
  svg { display: block; }
  .lane-label { font-size: 12px; font-weight: 700; fill: #333; }
  .task { rx: 8; ry: 8; stroke-width: 1.5; }
  .task-success { fill: #E8F5E9; stroke: #4CAF50; }
  .task-mia { fill: #F3E5F5; stroke: #9C27B0; }
  .task-ef { fill: #E3F2FD; stroke: #1976D2; }
  .task-pv { fill: #FFF8E1; stroke: #F9A825; }
  .task-lost { fill: #FFEBEE; stroke: #E53935; }
  .task-text { font-size: 11px; fill: #333; text-anchor: middle; dominant-baseline: central; }
  .task-text-small { font-size: 9.5px; fill: #666; text-anchor: middle; dominant-baseline: central; }
  .gateway { fill: #FFF9C4; stroke: #F9A825; stroke-width: 1.5; }
  .gateway-text { font-size: 9.5px; fill: #333; text-anchor: middle; }
  .flow { stroke: #666; stroke-width: 1.2; fill: none; marker-end: url(#arrow); }
  .flow-yes { stroke: #4CAF50; stroke-width: 1.2; fill: none; marker-end: url(#arrow-green); }
  .flow-no { stroke: #E53935; stroke-width: 1.2; fill: none; marker-end: url(#arrow-red); }
  .flow-dashed { stroke: #1976D2; stroke-width: 1.2; fill: none; stroke-dasharray: 6,3; marker-end: url(#arrow-blue); }
  .label-flow { font-size: 10px; font-weight: 600; }
  .label-yes { fill: #4CAF50; }
  .label-no { fill: #E53935; }
  .event-start { fill: #E8F5E9; stroke: #4CAF50; stroke-width: 2; }
  .event-end-ok { fill: #4CAF50; stroke: #2E7D32; stroke-width: 3; }
  .event-end-fail { fill: #E53935; stroke: #B71C1C; stroke-width: 3; }
  .lane-bg-lead { fill: #E3F2FD; opacity: 0.3; }
  .lane-bg-mia { fill: #F3E5F5; opacity: 0.3; }
  .lane-bg-ef { fill: #E8EAF6; opacity: 0.3; }
  .lane-bg-pv { fill: #FFF8E1; opacity: 0.3; }
  .lane-bg-pd { fill: #E8F5E9; opacity: 0.3; }
  .lane-divider { stroke: #ccc; stroke-width: 0.5; }
  .lane-header { fill: #fff; stroke: #ddd; stroke-width: 1; }
  .section-label { font-size: 9px; fill: #999; text-anchor: middle; font-style: italic; }

  .legend { display: flex; flex-wrap: wrap; gap: 16px; padding: 16px 24px; border-top: 1px solid #eee; background: #fafafa; border-radius: 0 0 12px 12px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #555; }
  .legend-color { width: 24px; height: 16px; border-radius: 4px; border: 1.5px solid; }
  .legend-diamond { width: 14px; height: 14px; transform: rotate(45deg); border: 1.5px solid #F9A825; background: #FFF9C4; }
  .legend-circle { width: 14px; height: 14px; border-radius: 50%; }
  .legend-line { width: 24px; height: 0; border-top: 2px solid; }
  .legend-line-dashed { width: 24px; height: 0; border-top: 2px dashed #1976D2; }
</style>
</head>
<body>

<h1>PROCESSO COMERCIAL — CLICK TO WHATSAPP (VENDAS SPOT)</h1>
<p class="subtitle">Should Be — Arquitetura com Webhook (Mínima Dependência da Morada)</p>

<div class="container">
<svg viewBox="0 0 1560 780" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#666"/></marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#4CAF50"/></marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#E53935"/></marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#1976D2"/></marker>
  </defs>

  <!-- Lane backgrounds -->
  <rect x="80" y="0" width="1480" height="80" class="lane-bg-lead"/>
  <rect x="80" y="80" width="1480" height="250" class="lane-bg-mia"/>
  <rect x="80" y="330" width="1480" height="140" class="lane-bg-ef"/>
  <rect x="80" y="470" width="1480" height="130" class="lane-bg-pv"/>
  <rect x="80" y="600" width="1480" height="100" class="lane-bg-pd"/>

  <!-- Lane dividers -->
  <line x1="80" y1="80" x2="1560" y2="80" class="lane-divider"/>
  <line x1="80" y1="330" x2="1560" y2="330" class="lane-divider"/>
  <line x1="80" y1="470" x2="1560" y2="470" class="lane-divider"/>
  <line x1="80" y1="600" x2="1560" y2="600" class="lane-divider"/>
  <line x1="80" y1="700" x2="1560" y2="700" class="lane-divider"/>

  <!-- Lane headers -->
  <rect x="0" y="0" width="80" height="80" class="lane-header"/>
  <rect x="0" y="80" width="80" height="250" class="lane-header"/>
  <rect x="0" y="330" width="80" height="140" class="lane-header"/>
  <rect x="0" y="470" width="80" height="130" class="lane-header"/>
  <rect x="0" y="600" width="80" height="100" class="lane-header"/>

  <!-- Lane labels (rotated) -->
  <text x="40" y="40" class="lane-label" text-anchor="middle" dominant-baseline="central" style="font-size:11px">Lead /</text>
  <text x="40" y="54" class="lane-label" text-anchor="middle" dominant-baseline="central" style="font-size:11px">Cliente</text>

  <text x="40" y="205" class="lane-label" text-anchor="middle" dominant-baseline="central" style="font-size:11px">MIA</text>
  <text x="40" y="220" class="lane-label" text-anchor="middle" dominant-baseline="central" style="font-size:9px;font-weight:400;fill:#9C27B0">(só conversa</text>
  <text x="40" y="232" class="lane-label" text-anchor="middle" dominant-baseline="central" style="font-size:9px;font-weight:400;fill:#9C27B0">+ campos)</text>

  <text x="40" y="392" class="lane-label" text-anchor="middle" dominant-baseline="central" style="font-size:11px">Edge</text>
  <text x="40" y="407" class="lane-label" text-anchor="middle" dominant-baseline="central" style="font-size:11px">Function</text>
  <text x="40" y="422" class="lane-label" text-anchor="middle" dominant-baseline="central" style="font-size:9px;font-weight:400;fill:#1976D2">(saleszone)</text>

  <text x="40" y="530" class="lane-label" text-anchor="middle" dominant-baseline="central" style="font-size:11px">Pré-</text>
  <text x="40" y="545" class="lane-label" text-anchor="middle" dominant-baseline="central" style="font-size:11px">Vendedor</text>

  <text x="40" y="650" class="lane-label" text-anchor="middle" dominant-baseline="central" style="font-size:11px">Pipedrive</text>

  <!-- ========== LEAD/CLIENTE LANE ========== -->

  <!-- Start event -->
  <circle cx="130" cy="40" r="15" class="event-start"/>

  <!-- Task: Envia mensagem -->
  <rect x="170" y="15" width="150" height="50" class="task task-success"/>
  <text x="245" y="35" class="task-text">Envia mensagem</text>
  <text x="245" y="50" class="task-text-small">via WhatsApp (CTWA)</text>

  <!-- Arrow: start → envia msg -->
  <line x1="145" y1="40" x2="170" y2="40" class="flow"/>

  <!-- ========== MIA LANE ========== -->

  <!-- Task: Identifica empreendimento -->
  <rect x="170" y="105" width="150" height="50" class="task task-mia"/>
  <text x="245" y="122" class="task-text">Identifica</text>
  <text x="245" y="137" class="task-text">empreendimento</text>
  <text x="245" y="150" class="task-text-small">(metadados campanha)</text>

  <!-- Arrow: envia msg → identifica -->
  <line x1="245" y1="65" x2="245" y2="105" class="flow"/>

  <!-- Task: Conduz 3 perguntas -->
  <rect x="370" y="105" width="160" height="50" class="task task-mia"/>
  <text x="450" y="122" class="task-text">Conduz 3 perguntas</text>
  <text x="450" y="137" class="task-text">de qualificação</text>
  <text x="450" y="150" class="task-text-small">(preenche campos)</text>

  <!-- Arrow: identifica → perguntas -->
  <line x1="320" y1="130" x2="370" y2="130" class="flow"/>

  <!-- Gateway: MIA consegue? -->
  <polygon points="600,130 625,105 650,130 625,155" class="gateway"/>
  <text x="625" y="97" class="gateway-text">MIA</text>
  <text x="625" y="168" class="gateway-text">consegue?</text>

  <!-- Arrow: perguntas → gateway -->
  <line x1="530" y1="130" x2="600" y2="130" class="flow"/>

  <!-- === NÃO path (cadência esgotada) === -->

  <!-- Task: Preenche Etapa final = Lost (cadência) -->
  <rect x="565" y="220" width="120" height="50" class="task task-lost"/>
  <text x="625" y="237" class="task-text-small">Preenche:</text>
  <text x="625" y="250" class="task-text-small">Etapa final = Lost</text>
  <text x="625" y="263" class="task-text-small">(cadência 24h)</text>

  <!-- Arrow: gateway → cadência (Não) -->
  <line x1="625" y1="155" x2="625" y2="220" class="flow-no"/>
  <text x="640" y="185" class="label-flow label-no">Não</text>

  <!-- Gateway: Qualificado? -->
  <polygon points="730,130 755,105 780,130 755,155" class="gateway"/>
  <text x="755" y="97" class="gateway-text">Qualifi-</text>
  <text x="755" y="168" class="gateway-text">cado?</text>

  <!-- Arrow: MIA consegue SIM → Qualificado? -->
  <line x1="650" y1="130" x2="730" y2="130" class="flow-yes"/>
  <text x="685" y="122" class="label-flow label-yes">Sim</text>

  <!-- === NÃO QUALIFICADO path === -->

  <!-- Task: Preenche Etapa final = Lost (não qualif) -->
  <rect x="695" y="220" width="120" height="50" class="task task-lost"/>
  <text x="755" y="237" class="task-text-small">Preenche:</text>
  <text x="755" y="250" class="task-text-small">Etapa final = Lost</text>
  <text x="755" y="263" class="task-text-small">+ Motivo [MIA]</text>

  <!-- Arrow: qualificado? → não qualificado (Não) -->
  <line x1="755" y1="155" x2="755" y2="220" class="flow-no"/>
  <text x="770" y="185" class="label-flow label-no">Não</text>

  <!-- === SIM QUALIFICADO path === -->

  <!-- Task: Preenche Data de Qualificação -->
  <rect x="830" y="105" width="140" height="50" class="task task-mia"/>
  <text x="900" y="122" class="task-text-small">Preenche:</text>
  <text x="900" y="137" class="task-text">Data de Qualificação</text>

  <!-- Arrow: qualificado SIM → preenche data -->
  <line x1="780" y1="130" x2="830" y2="130" class="flow-yes"/>
  <text x="800" y="122" class="label-flow label-yes">Sim</text>

  <!-- Task: Propõe agenda -->
  <rect x="1020" y="105" width="130" height="50" class="task task-mia"/>
  <text x="1085" y="125" class="task-text">Propõe agenda</text>
  <text x="1085" y="140" class="task-text-small">ao lead</text>

  <!-- Arrow: data qualif → propõe agenda -->
  <line x1="970" y1="130" x2="1020" y2="130" class="flow"/>

  <!-- Gateway: MIA consegue agendar? -->
  <polygon points="1210,130 1235,105 1260,130 1235,155" class="gateway"/>
  <text x="1235" y="97" class="gateway-text">MIA</text>
  <text x="1235" y="168" class="gateway-text">agenda?</text>

  <!-- Arrow: propõe → gateway agenda -->
  <line x1="1150" y1="130" x2="1210" y2="130" class="flow"/>

  <!-- === SIM AGENDA path === -->

  <!-- Task: Preenche Status Reunião = Confirmada -->
  <rect x="1310" y="105" width="140" height="50" class="task task-mia"/>
  <text x="1380" y="122" class="task-text-small">Preenche:</text>
  <text x="1380" y="137" class="task-text-small">Status Reunião =</text>
  <text x="1380" y="150" class="task-text">Confirmada</text>

  <!-- Arrow: gateway SIM → preenche status -->
  <line x1="1260" y1="130" x2="1310" y2="130" class="flow-yes"/>
  <text x="1280" y="122" class="label-flow label-yes">Sim</text>

  <!-- === NÃO AGENDA → TRANSBORDO path === -->

  <!-- Task: Preenche Etapa final = Transbordo -->
  <rect x="1175" y="220" width="120" height="50" class="task task-mia"/>
  <text x="1235" y="237" class="task-text-small">Preenche:</text>
  <text x="1235" y="250" class="task-text-small">Etapa final =</text>
  <text x="1235" y="263" class="task-text-small">Transbordo</text>

  <!-- Arrow: gateway NÃO → transbordo -->
  <line x1="1235" y1="155" x2="1235" y2="220" class="flow-no"/>
  <text x="1250" y="185" class="label-flow label-no">Não</text>

  <!-- ========== EDGE FUNCTION LANE ========== -->

  <!-- EF: Cria Lead -->
  <rect x="170" y="365" width="150" height="50" class="task task-ef"/>
  <text x="245" y="382" class="task-text">Cria Lead no</text>
  <text x="245" y="397" class="task-text">Pipedrive Leads</text>
  <text x="245" y="410" class="task-text-small">POST /leads</text>

  <!-- Dashed arrow: identifica → cria lead -->
  <line x1="245" y1="155" x2="245" y2="365" class="flow-dashed"/>

  <!-- EF: Arquiva Lead (sem resposta) -->
  <rect x="565" y="365" width="120" height="50" class="task task-ef"/>
  <text x="625" y="382" class="task-text-small">Arquiva Lead</text>
  <text x="625" y="397" class="task-text-small">Lost: Sem resposta</text>
  <text x="625" y="410" class="task-text-small" style="fill:#999">PATCH is_archived</text>

  <!-- Dashed arrow: preenche lost cadência → EF arquiva -->
  <line x1="625" y1="270" x2="625" y2="365" class="flow-dashed"/>

  <!-- EF: Arquiva Lead (não qualificado) -->
  <rect x="695" y="365" width="120" height="50" class="task task-ef"/>
  <text x="755" y="382" class="task-text-small">Arquiva Lead</text>
  <text x="755" y="397" class="task-text-small">Lost: Não qualif.</text>
  <text x="755" y="410" class="task-text-small" style="fill:#999">PATCH is_archived</text>

  <!-- Dashed arrow: preenche lost não qualif → EF arquiva -->
  <line x1="755" y1="270" x2="755" y2="365" class="flow-dashed"/>

  <!-- EF: Label → MQL -->
  <rect x="840" y="365" width="120" height="50" class="task task-ef"/>
  <text x="900" y="382" class="task-text">Label → MQL</text>
  <text x="900" y="397" class="task-text-small">PATCH label_ids</text>

  <!-- Dashed arrow: preenche data qualif → EF MQL -->
  <line x1="900" y1="155" x2="900" y2="365" class="flow-dashed"/>

  <!-- EF: Convert Lead → Deal + Calendar -->
  <rect x="1310" y="365" width="150" height="50" class="task task-ef"/>
  <text x="1385" y="378" class="task-text">Convert Lead →</text>
  <text x="1385" y="393" class="task-text">Deal (pipeline 28)</text>
  <text x="1385" y="408" class="task-text-small">+ cria Calendar event</text>

  <!-- Dashed arrow: preenche status confirmada → EF convert -->
  <line x1="1380" y1="155" x2="1385" y2="365" class="flow-dashed"/>

  <!-- EF: Assign PV -->
  <rect x="1175" y="365" width="120" height="50" class="task task-ef"/>
  <text x="1235" y="382" class="task-text">Assign owner</text>
  <text x="1235" y="397" class="task-text-small">→ Pré-Vendedor</text>
  <text x="1235" y="410" class="task-text-small" style="fill:#999">PATCH owner_id</text>

  <!-- Dashed arrow: preenche transbordo → EF assign -->
  <line x1="1235" y1="270" x2="1235" y2="365" class="flow-dashed"/>

  <!-- ========== PRÉ-VENDEDOR LANE ========== -->

  <!-- PV: Assume com histórico -->
  <rect x="1175" y="500" width="120" height="50" class="task task-pv"/>
  <text x="1235" y="517" class="task-text-small">PV assume com</text>
  <text x="1235" y="532" class="task-text-small">histórico conversa</text>

  <!-- Arrow: EF assign → PV assume -->
  <line x1="1235" y1="415" x2="1235" y2="500" class="flow"/>

  <!-- PV: Agenda manualmente -->
  <rect x="1330" y="500" width="130" height="50" class="task task-pv"/>
  <text x="1395" y="517" class="task-text">PV agenda</text>
  <text x="1395" y="532" class="task-text-small">manualmente</text>

  <!-- Arrow: PV assume → PV agenda -->
  <line x1="1295" y1="525" x2="1330" y2="525" class="flow"/>

  <!-- Arrow: PV agenda → preenche Status Reunião (goes up to MIA lane) -->
  <path d="M 1395 500 L 1395 175 L 1380 155" class="flow" style="stroke:#F9A825"/>

  <!-- ========== PIPEDRIVE LANE ========== -->

  <!-- End events: Lost (sem resposta) -->
  <circle cx="625" cy="645" r="13" class="event-end-fail"/>
  <text x="625" y="670" class="task-text-small" style="fill:#E53935">Lost</text>

  <!-- Arrow: EF arquiva sem resp → end -->
  <line x1="625" y1="415" x2="625" y2="632" class="flow-no"/>

  <!-- End events: Lost (não qualif) -->
  <circle cx="755" cy="645" r="13" class="event-end-fail"/>
  <text x="755" y="670" class="task-text-small" style="fill:#E53935">Lost</text>
  <text x="755" y="683" class="task-text-small" style="fill:#999">(nutrição futura)</text>

  <!-- Arrow: EF arquiva não qualif → end -->
  <line x1="755" y1="415" x2="755" y2="632" class="flow-no"/>

  <!-- End event: Sucesso -->
  <circle cx="1385" cy="645" r="13" class="event-end-ok"/>
  <text x="1385" y="670" class="task-text-small" style="fill:#4CAF50">Deal criado</text>
  <text x="1385" y="683" class="task-text-small" style="fill:#4CAF50">+ Agendamento</text>

  <!-- Arrow: EF convert → end sucesso -->
  <line x1="1385" y1="415" x2="1385" y2="632" class="flow-yes"/>

  <!-- ========== WEBHOOK LABELS ========== -->
  <text x="258" y="340" class="section-label" style="fill:#1976D2">webhook: lead criado</text>
  <text x="625" y="340" class="section-label" style="fill:#1976D2">webhook: Etapa final = Lost</text>
  <text x="755" y="340" class="section-label" style="fill:#1976D2">webhook: Etapa final = Lost</text>
  <text x="900" y="340" class="section-label" style="fill:#1976D2">webhook: Data Qualif.</text>
  <text x="1235" y="340" class="section-label" style="fill:#1976D2">webhook: Transbordo</text>
  <text x="1385" y="340" class="section-label" style="fill:#1976D2">webhook: Reunião Confirmada</text>

</svg>

<div class="legend">
  <div class="legend-item"><div class="legend-color" style="background:#F3E5F5;border-color:#9C27B0"></div> MIA — conversa + preenche campos</div>
  <div class="legend-item"><div class="legend-color" style="background:#E3F2FD;border-color:#1976D2"></div> Edge Function — lógica de negócio</div>
  <div class="legend-item"><div class="legend-color" style="background:#FFF8E1;border-color:#F9A825"></div> Pré-Vendedor</div>
  <div class="legend-item"><div class="legend-color" style="background:#E8F5E9;border-color:#4CAF50"></div> Caminho de sucesso</div>
  <div class="legend-item"><div class="legend-color" style="background:#FFEBEE;border-color:#E53935"></div> Lost (exceção)</div>
  <div class="legend-item"><div class="legend-diamond"></div> Gateway (decisão)</div>
  <div class="legend-item"><div class="legend-line-dashed"></div> Webhook trigger</div>
  <div class="legend-item"><div class="legend-circle" style="background:#4CAF50;border:2px solid #2E7D32"></div> Sucesso</div>
  <div class="legend-item"><div class="legend-circle" style="background:#E53935;border:2px solid #B71C1C"></div> Lost</div>
</div>

</div>

</body>
</html>
